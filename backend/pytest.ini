[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_default_fixture_loop_scope = function
addopts = 
    --cov=services
    --cov=main
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=30
    -v
markers =
    asyncio: mark test as async